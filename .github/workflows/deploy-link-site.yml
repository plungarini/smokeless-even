name: Deploy Google Link Site

on:
  push:
    branches:
      - master
      - develop
    paths:
      - '.github/workflows/deploy-link-site.yml'
      - 'link-site/**'
      - 'src/linker/**'
      - 'src/services/google-link.ts'
      - 'src/config/env.ts'
      - 'src/lib/firebase.ts'
      - 'vite.link.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smokeless-link-site
  cancel-in-progress: false

jobs:
  deploy-production:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Node
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production link site
        run: npm run build:link-site
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION }}
          VITE_GOOGLE_LINK_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Add deployment metadata
        run: |
          echo '{"environment":"production","branch":"${{ github.ref_name }}","commit":"${{ github.sha }}"}' > link-dist/version.json

      - name: Deploy production
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./link-dist
          destination_dir: .
          keep_files: true

      - name: Output production URL
        run: |
          echo "Production: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

  deploy-staging:
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Node
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging link site
        run: npm run build:link-site
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/staging/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_FUNCTIONS_REGION: ${{ secrets.VITE_FIREBASE_FUNCTIONS_REGION }}
          VITE_GOOGLE_LINK_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/staging/

      - name: Add deployment metadata
        run: |
          echo '{"environment":"staging","branch":"${{ github.ref_name }}","commit":"${{ github.sha }}"}' > link-dist/version.json

      - name: Deploy staging
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./link-dist
          destination_dir: staging
          keep_files: true

      - name: Output staging URL
        run: |
          echo "Staging: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/staging/"
